<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1"/>
<title>기술전략팀 업무관리</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📋</text></svg>">
<link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
<link rel="stylesheet" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css"/>
<style>
/* ==============================================================
   CSS 변수 - index.html과 동일한 색상 시스템
   여기 색상 하나만 바꿔도 전체에 반영됩니다
============================================================== */
:root{
  --blueprint:#2B6CB0;        /* 메인 파란색 */
  --blueprint-strong:#1B4D89; /* 파란색 hover */
  --blueprint-bg:#EAF2FB;     /* 연한 파란 배경 */
  --line:#D3DEE9;             /* 테두리 색 */
  --paper:#F5F7FA;            /* 페이지 배경 */
  --ink:#1A2332;              /* 기본 글자색 */
  --muted:#64748B;            /* 보조 글자색 */
  --danger:#C0392B;           /* 삭제·빨간색 */
  --success:#34A853;          /* 초록색 */
  --warning:#FBBC04;          /* 노란색 */
  --plan:#7C5CBF;             /* 보라색 */
  --plan-bg:#F3EEFC;
  --sans:'Pretendard',-apple-system,BlinkMacSystemFont,'Malgun Gothic',sans-serif;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;height:100%;overflow:hidden;}
body{
  background:var(--paper);color:var(--ink);
  font-family:var(--sans);font-size:14px;
  -webkit-font-smoothing:antialiased;
  word-break:keep-all;overflow-wrap:break-word;
}

/* ==============================================================
   헤더 - index.html .header와 완전 동일
============================================================== */
.header{
  background:#fff;border-bottom:1px solid var(--line);
  padding:0 20px;display:flex;align-items:center;justify-content:space-between;
  height:60px;position:sticky;top:0;z-index:30;
  box-shadow:0 1px 3px rgba(0,0,0,.12),0 1px 2px rgba(0,0,0,.08);
}
.header h1{
  font-size:18px;font-weight:600;
  display:flex;align-items:center;gap:8px;
  color:var(--ink);white-space:nowrap;min-width:0;
}
/* "기술전략팀" 글자만 파란색 - index.html과 동일 패턴 */
.header h1 span{color:var(--blueprint);}
.header-right{display:flex;align-items:center;gap:14px;flex-shrink:0;}
.app-version{font-size:12px;color:#B8C0CC;white-space:nowrap;}
.sync-status{font-size:12px;color:var(--muted);display:flex;align-items:center;gap:5px;white-space:nowrap;}
.sync-dot{width:8px;height:8px;border-radius:50%;background:var(--success);flex-shrink:0;}
.sync-dot.loading{background:var(--warning);animation:pulse 1s infinite;}
.sync-dot.error{background:var(--danger);}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* ==============================================================
   탭바 - index.html .tab-bar / .tab과 완전 동일
============================================================== */
.tab-bar{
  background:#fff;border-bottom:1px solid var(--line);
  padding:0 20px;display:flex;
}
.tab{
  padding:14px 20px;font-size:14px;font-weight:500;
  color:var(--muted);border:none;background:none;cursor:pointer;
  border-bottom:3px solid transparent;transition:all .15s;white-space:nowrap;
}
.tab:hover{color:var(--ink);}
.tab.active{color:var(--blueprint);border-bottom-color:var(--blueprint);}

/* ==============================================================
   툴바
============================================================== */
.toolbar{
  display:flex;align-items:center;justify-content:space-between;
  gap:10px;flex-wrap:wrap;padding:10px 20px;
  background:#fff;border-bottom:1px solid var(--line);
}
.toolbar-left{display:flex;align-items:center;gap:8px;flex-wrap:wrap;flex:1;min-width:0;}
.toolbar-right{display:flex;align-items:center;gap:8px;flex-shrink:0;}

/* 검색창 */
.search-input{
  padding:7px 12px;border:1px solid var(--line);border-radius:7px;
  font-size:13px;font-family:var(--sans);color:var(--ink);
  outline:none;width:200px;transition:border-color .15s;
}
.search-input:focus{border-color:var(--blueprint);}

/* 필터 셀렉트 */
.filter-sel{
  padding:7px 10px;border:1px solid var(--line);border-radius:7px;
  font-size:13px;font-family:var(--sans);color:var(--ink);
  background:#fff;outline:none;cursor:pointer;
}
.filter-sel:focus{border-color:var(--blueprint);}

/* 새로고침 버튼 - index.html .refresh-btn 완전 동일 */
.refresh-btn{
  background:#FDF1F5;color:#D6558C;border:1px solid #F3C4D6;
  font-size:13px;padding:8px 14px;border-radius:7px;cursor:pointer;
  font-family:var(--sans);font-weight:600;
  display:inline-flex;align-items:center;gap:4px;
  white-space:nowrap;transition:background .15s;
}
.refresh-btn:hover{background:#FBE4ED;}

/* 추가 버튼 - 파란 꽉찬 스타일 */
.add-btn{
  background:var(--blueprint);color:#fff;border:1px solid var(--blueprint);
  font-size:13px;padding:8px 14px;border-radius:7px;cursor:pointer;
  font-family:var(--sans);font-weight:600;
  display:inline-flex;align-items:center;gap:4px;
  white-space:nowrap;transition:background .15s;
}
.add-btn:hover{background:var(--blueprint-strong);border-color:var(--blueprint-strong);}

/* 초기 업로드 버튼 */
.import-btn{
  background:#E8F5E9;color:#2E7D52;border:1px solid #A5D6A7;
  font-size:13px;padding:8px 14px;border-radius:7px;cursor:pointer;
  font-family:var(--sans);font-weight:600;
  display:inline-flex;align-items:center;gap:4px;
  white-space:nowrap;transition:background .15s;
}
.import-btn:hover{background:#C8E6C9;}

/* ==============================================================
   요약 카드 (업무 탭)
============================================================== */
.summary-bar{
  display:flex;gap:10px;flex-wrap:wrap;
  background:#fff;border-bottom:1px solid var(--line);
  padding:8px 20px;
}
.sum-card{
  display:flex;align-items:center;gap:7px;
  padding:5px 13px;border-radius:20px;
  font-size:13px;font-weight:600;
  background:var(--paper);border:1px solid var(--line);
}
.sum-card .num{font-size:15px;font-weight:700;}
.sum-card.done{background:#EAF4FB;border-color:#B3D9F0;color:#1565C0;}
.sum-card.ing{background:var(--plan-bg);border-color:#C9B8F0;color:var(--plan);}
.sum-card.hold{background:#FFF8E1;border-color:#FFD54F;color:#B7770D;}
.sum-card.cont{background:#E8F5E9;border-color:#A5D6A7;color:#2E7D52;}
.sum-card.req{background:#FFEBEE;border-color:#FFCDD2;color:var(--danger);}

/* ==============================================================
   탭 패널
============================================================== */
.main{display:flex;flex-direction:column;height:calc(100vh - 60px);}
.tab-panel{display:none;flex:1;flex-direction:column;overflow:hidden;}
.tab-panel.active{display:flex;}

/* ==============================================================
   인라인 편집 테이블
============================================================== */
.table-wrap{flex:1;overflow:auto;}
table{width:100%;border-collapse:collapse;min-width:1050px;font-size:13px;}
thead th{
  background:#F0F4FA;padding:9px 10px;
  font-size:12px;font-weight:700;color:var(--blueprint);
  text-align:center;border-bottom:2px solid var(--line);
  border-right:1px solid var(--line);white-space:nowrap;
  position:sticky;top:0;z-index:5;
}
thead th:last-child{border-right:none;}
tbody tr{border-bottom:1px solid var(--line);transition:background .1s;}
tbody tr:hover{background:var(--blueprint-bg);}
tbody tr.editing-row{background:#FFFDE7;}
tbody tr.editing-row:hover{background:#FFF9C4;}
tbody td{padding:0;border-right:1px solid #EEF1F5;vertical-align:middle;}
tbody td:last-child{border-right:none;}

/* 셀 뷰 (클릭 전) */
.cell-view{
  padding:8px 10px;min-height:36px;
  display:flex;align-items:center;gap:4px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:280px;
}

/* 셀 인풋 (클릭 후 - 인라인 편집) */
.cell-input{
  width:100%;padding:7px 10px;border:none;
  border-bottom:2px solid var(--blueprint);
  background:#FFFDE7;font-size:13px;font-family:var(--sans);
  color:var(--ink);outline:none;min-height:36px;
}
.cell-select{
  width:100%;padding:7px 8px;border:none;
  border-bottom:2px solid var(--blueprint);
  background:#FFFDE7;font-size:13px;font-family:var(--sans);
  color:var(--ink);outline:none;cursor:pointer;
}

/* ==============================================================
   뱃지
============================================================== */
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:700;white-space:nowrap;}
.b-done{background:#E3F2FD;color:#1565C0;}
.b-ing{background:var(--plan-bg);color:var(--plan);}
.b-hold{background:#FFF8E1;color:#B7770D;}
.b-cont{background:#E8F5E9;color:#2E7D52;}
.b-req{background:#FFEBEE;color:var(--danger);}

/* pb/ib 스타일은 아래 알약형 CSS 블록에서 통합 정의됨 */

/* ==============================================================
   행 관리 버튼
============================================================== */
.row-action-cell{padding:5px 8px !important;white-space:nowrap;}
.btn-row-save{padding:4px 10px;background:var(--blueprint);color:#fff;border:none;border-radius:5px;font-size:12px;font-weight:600;cursor:pointer;font-family:var(--sans);margin-right:4px;}
.btn-row-save:hover{background:var(--blueprint-strong);}
.btn-row-del{padding:4px 10px;background:#FFEBEE;color:var(--danger);border:1px solid #FFCDD2;border-radius:5px;font-size:12px;font-weight:600;cursor:pointer;font-family:var(--sans);}
.btn-row-del:hover{background:#FFCDD2;}
.btn-row-edit{padding:4px 10px;background:var(--paper);color:var(--muted);border:1px solid var(--line);border-radius:5px;font-size:12px;font-weight:500;cursor:pointer;font-family:var(--sans);white-space:nowrap;}
.btn-row-edit:hover{background:var(--blueprint-bg);color:var(--blueprint);border-color:var(--blueprint);}

/* ==============================================================
   경비 탭 예산 현황 바
============================================================== */
.budget-bar{
  background:#fff;border-bottom:1px solid var(--line);
  padding:12px 20px;display:flex;align-items:center;gap:24px;flex-wrap:wrap;
}
.budget-item .bl{font-size:11px;color:var(--muted);margin-bottom:2px;}
.budget-item .bv{font-size:16px;font-weight:700;color:var(--ink);}
.budget-item .bv.spent{color:var(--danger);}
.budget-item .bv.remain{color:#2E7D52;}
.progress-wrap{flex:1;min-width:160px;background:#EEF1F5;border-radius:20px;height:8px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--blueprint),var(--plan));border-radius:20px;transition:width .5s ease;}

/* ==============================================================
   빈 데이터
============================================================== */
.empty-msg{text-align:center;padding:48px 20px;color:#B0BEC5;font-size:14px;}

/* ==============================================================
   모달 - index.html .modal-overlay / .modal-panel과 동일
   배경 클릭해도 닫히지 않음
============================================================== */
.modal-overlay{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,.4);z-index:1000;
  align-items:center;justify-content:center;
}
.modal-overlay.open{display:flex;}
.modal-panel{
  background:#fff;border-radius:12px;
  width:90%;max-width:560px;max-height:88vh;overflow-y:auto;
  box-shadow:0 8px 40px rgba(0,0,0,.18);
}
.modal-header{
  padding:16px 20px;border-bottom:1px solid var(--line);
  display:flex;align-items:center;justify-content:space-between;
}
.modal-header h3{margin:0;font-size:15px;font-weight:700;}
.modal-close{border:none;background:none;font-size:18px;cursor:pointer;color:var(--muted);}
.modal-body{padding:16px 20px;}
.modal-footer{padding:12px 20px;border-top:1px solid var(--line);display:flex;justify-content:flex-end;gap:8px;}

/* 폼 필드 */
.field{margin-bottom:14px;}
.field label{display:block;font-size:12px;font-weight:600;color:var(--muted);margin-bottom:5px;}
.field input,.field select,.field textarea{
  width:100%;padding:8px 11px;border:1px solid var(--line);border-radius:7px;
  font-size:13px;font-family:var(--sans);color:var(--ink);
  outline:none;background:#fff;transition:border-color .15s;
}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--blueprint);}
.field textarea{resize:vertical;min-height:60px;}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}

/* 모달 버튼 - index.html .btn과 동일 */
.btn{padding:8px 18px;border-radius:7px;font-size:13px;font-weight:600;cursor:pointer;font-family:var(--sans);border:1px solid var(--line);background:#fff;color:var(--ink);}
.btn:hover{background:var(--paper);}
.btn.primary{background:var(--blueprint);border-color:var(--blueprint);color:#fff;}
.btn.primary:hover{background:var(--blueprint-strong);}
.btn.danger{color:var(--danger);border-color:#F0CBC5;}
.btn.danger:hover{background:#FDEEEC;}

/* ==============================================================
   토스트 - index.html .toast와 동일
============================================================== */
.toast{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
  background:#0B1220;color:#fff;padding:10px 20px;border-radius:8px;
  font-size:13px;font-weight:500;opacity:0;transition:opacity .25s;
  z-index:9999;pointer-events:none;white-space:nowrap;
}
.toast.show{opacity:1;}

/* ==============================================================
   모바일 반응형
============================================================== */
@media(max-width:480px){
  .header{padding:0 14px;height:56px;}
  .header h1{font-size:15px;}
  .toolbar{padding:8px 14px;}
  .search-input{width:130px;}
  .tab{padding:12px 14px;font-size:13px;}
  .summary-bar{padding:6px 14px;}
  .budget-bar{padding:10px 14px;gap:12px;}
}

/* ==============================================================
   상태별 행 배경색 - 은은하게 구분
   요청=분홍, 진행중=보라, 지속=초록, 보류=노랑, 완료=파랑
============================================================== */
tbody tr.row-req  { background:#FFF5F7; }   /* 요청: 연분홍 */
tbody tr.row-ing  { background:#F8F5FF; }   /* 진행중: 연보라 */
tbody tr.row-cont { background:#F4FBF7; }   /* 지속진행: 연초록 */
tbody tr.row-hold { background:#FFFDF0; }   /* 보류: 연노랑 */
tbody tr.row-done { background:#F3F8FD; }   /* 완료: 연파랑 */
/* 호버 시 조금 더 진하게 */
tbody tr.row-req:hover  { background:#FFE9EF; }
tbody tr.row-ing:hover  { background:#EDE7FF; }
tbody tr.row-cont:hover { background:#E6F7EE; }
tbody tr.row-hold:hover { background:#FFF8D6; }
tbody tr.row-done:hover { background:#E4F1FB; }
/* 편집 중인 행은 노란빛으로 강조 */
tbody tr.editing-row { background:#FFFDE7 !important; }

/* ==============================================================
   알약 뱃지 - 모든 드롭다운 값에 통일 적용
   기존 뱃지와 같은 border-radius:20px 스타일
============================================================== */
/* 모델링/제작도/매뉴얼 진행상태 뱃지 */
.pb{ display:inline-block; padding:3px 9px; border-radius:20px; font-size:11px; font-weight:700; white-space:nowrap; }
.pb-완료   { background:#E3F4FB; color:#2E86AB; }
.pb-진행중 { background:#F0EBFF; color:#7C5CBF; }
.pb-미적용 { background:#F0F0F0; color:#999; }
.pb-보류   { background:#FFF5E0; color:#D48806; }
/* 강도 뱃지 - 알약형으로 통일 */
.ib{ display:inline-block; padding:3px 9px; border-radius:20px; font-size:11px; font-weight:700; white-space:nowrap; }
.ib-최상 { background:#FFE0E0; color:#C0392B; }
.ib-상   { background:#FFE8CC; color:#D35400; }
.ib-중   { background:#FFF5CC; color:#B7770D; }
.ib-하   { background:#E8F5E9; color:#2E7D32; }
.ib-최하 { background:#F0F0F0; color:#666; }
/* 영업담당 뱃지 */
.sb{ display:inline-block; padding:3px 9px; border-radius:20px; font-size:11px; font-weight:600; white-space:nowrap; background:#EDF2FF; color:#3B5BDB; }
/* 분류 뱃지 */
.cb{ display:inline-block; padding:3px 9px; border-radius:20px; font-size:11px; font-weight:600; white-space:nowrap; background:#FFF0F6; color:#C2255C; }
/* 파생값 셀 (리드/워크/세이브타임) */
.dval { font-size:12px; font-weight:700; color:var(--muted); text-align:center; }
.dval.save-pos { color:#2E7D32; }  /* 세이브타임 양수 = 초록 */
.dval.save-neg { color:#C0392B; }  /* 세이브타임 음수 = 빨강 */

/* ============================================================
   ★★ 셀 단위 편집 UI (2026-07 개편) ★★
   아래 스타일들은 "행 전체가 편집모드로 바뀌던 방식"을 없애고
   클릭한 셀 하나만 바로 편집되게 만드는 데 쓰입니다.
============================================================ */

/* ---- 테이블 컬럼 폭 조절(리사이즈) ----
   table-layout:fixed 여야 colgroup>col 의 너비가 그대로 먹습니다.
   width:100% 로 전체 폭을 고정 → 양끝은 안 움직이고 중간만 조절됨 */
#taskTableWrap table{ table-layout:fixed; width:100%; }
/* th 안에 핸들을 절대배치하므로 position:relative 필수.
   ★ th에 overflow:hidden 주면 핸들이 잘리므로 절대 금지! */
#taskTableWrap th{ position:relative; user-select:none; }
/* 컬럼 경계선을 잡아 끄는 손잡이 */
.col-resizer{
  position:absolute; right:-4px; top:0; bottom:0;
  width:8px;            /* ← 손잡이 클릭 영역 넓이 */
  cursor:col-resize; z-index:20;
  display:flex; align-items:center; justify-content:center;
}
.col-resizer::after{                 /* 손잡이 막대 모양 */
  content:''; display:block;
  width:2px; height:55%;
  background:#D0D8E4; border-radius:2px; transition:all .1s;
}
.col-resizer:hover::after,
.col-resizer.dragging::after{ background:var(--blueprint); height:75%; width:3px; }

/* ---- 셀 공통 박스 ----
   뷰/편집 상관없이 높이가 같아야 행이 안 흔들립니다. */
.c-box{
  min-height:38px; padding:6px 8px;
  display:flex; align-items:center;
  font-size:13px; color:var(--ink);
}

/* ---- 글자 직접 입력 셀 (프로젝트명/출고지 등) ----
   contenteditable = 클릭하면 그 자리에서 바로 타이핑됨 */
.c-text{
  outline:none; cursor:text; flex:1;
  border-radius:3px; transition:background .12s;
  overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
}
.c-text:focus{                        /* 편집 중일 때만 파란 테두리 */
  background:var(--blueprint-bg);
  box-shadow:inset 0 0 0 2px var(--blueprint);
  white-space:normal;                 /* 편집 중엔 전체 내용 보이게 */
}
.c-text:empty::before{                /* 빈 칸 안내문구 */
  content:attr(data-ph); color:#B0BEC5; pointer-events:none;
}

/* ---- 날짜 입력 셀 ---- */
.c-date{
  border:none; background:transparent; width:100%;
  font-size:12px; font-family:var(--sans); color:var(--ink);
  outline:none; cursor:pointer; padding:2px;
  border-radius:3px;
}
.c-date:focus{ background:var(--blueprint-bg); box-shadow:inset 0 0 0 2px var(--blueprint); }

/* ---- 드롭다운 뱃지 버튼 (상태/담당자/영업/분류) ---- */
.dd-btn{
  cursor:pointer; display:inline-flex; align-items:center; gap:3px;
  transition:opacity .12s; max-width:100%;
}
.dd-btn:hover{ opacity:.72; }

<script>
/* ============================================================
   Supabase 연결 설정
   URL과 anon 키 - 여기서 관리합니다
============================================================ */
const SB_URL = 'https://zrhwdvuehaelintkfoqn.supabase.co';
const SB_KEY = 'sb_publishable_oQ7F4Q9KRS22lpiE9uILFA_zN7n2V4V';
const H = {
  'Content-Type':'application/json',
  'apikey':SB_KEY,
  'Authorization':'Bearer '+SB_KEY,
  'Prefer':'return=representation'
};

/* ============================================================
   전역 상태 변수
============================================================ */
let taskData = [];   // 서버에서 불러온 전체 업무 데이터
let expData  = [];   // 서버에서 불러온 전체 경비 데이터
/* editingTaskId 는 더 이상 쓰지 않습니다 — 이제 셀 단위로 편집하므로
   '지금 어느 행이 편집중인지' 기억할 필요가 없어졌습니다. */
let editingExpId  = null;  // 현재 인라인 편집 중인 경비 행 ID

/* ============================================================
   정렬 설정
   sortCol: 현재 정렬 중인 컬럼 키
   sortDir: 'asc'(오름차순) or 'desc'(내림차순)
   기본은 status 기준 커스텀 순서 정렬
============================================================ */
let sortCol = 'status';
let sortDir = 'asc';

// 상태별 정렬 우선순위 - 요청→진행중→지속진행→보류→완료 순
const STATUS_ORDER = {
  '1. 요청': 1,
  '2 진행중': 2,
  '3. 지속적진행': 3,
  '4. 보류': 4,
  '5. 완료': 5,
};

/* ============================================================
   드롭다운 옵션 정의
   각 셀에서 공통으로 쓰는 선택지들
============================================================ */
/* ★★ 2026-07 개편: 옵션을 코드에 박아두지 않고 Supabase에서 불러옵니다 ★★
   app_options 테이블에 저장 → ⚙ 버튼으로 추가/삭제/색상/순서 변경 → 팀 전체 공유

   OPTIONS 안에는 이렇게 들어갑니다:
   OPTIONS.status = [ {id, opt_type, value, label, color_bg, color_fg, sort_order}, ... ] */
let OPTIONS = { status:[], lead:[], sub:[], sales:[], category:[], prog:[], intensity:[] };

/* ⚙ 모달 제목에 쓸 한글 이름 */
const OPT_TITLE = {
  status:'상태', lead:'주담당자', sub:'보조담당자', sales:'영업담당',
  category:'분류', prog:'진행상태 (모델링·제작도·매뉴얼 공용)', intensity:'강도'
};

/* ------------------------------------------------------------
   옵션 전체를 Supabase에서 읽어오기
   opt_type(종류)별로 sort_order(순서)대로 정렬해서 가져옵니다.
------------------------------------------------------------ */
async function loadOptions(){
  const res = await fetch(SB_URL+'/rest/v1/app_options?order=opt_type.asc,sort_order.asc', {headers:H});
  if(!res.ok) throw new Error('옵션 로드 실패 — app_options 테이블을 먼저 만들어주세요');
  const rows = await res.json();
  Object.keys(OPTIONS).forEach(k => OPTIONS[k] = []);   // 비우고
  rows.forEach(r => { if(OPTIONS[r.opt_type]) OPTIONS[r.opt_type].push(r); });  // 다시 채우기
}

/* 특정 종류에서 값 하나 찾기 */
function findOpt(type, value){
  return (OPTIONS[type]||[]).find(o => o.value === value) || null;
}
/* 화면에 보여줄 이름 (label 없으면 value 그대로) */
function optLabel(type, value){
  const o = findOpt(type, value);
  return o ? (o.label || o.value) : (value || '');
}
/* 뱃지 색상 {bg:배경, fg:글자} */
function optColor(type, value){
  const o = findOpt(type, value);
  return o ? { bg:o.color_bg||'#F0F0F0', fg:o.color_fg||'#555555' }
           : { bg:'#F0F0F0', fg:'#999999' };
}
/* <select> 만들 때 쓰는 형태로 변환 (업무추가 모달에서 사용) */
function optsFor(type){
  return (OPTIONS[type]||[]).map(o => ({ val:o.value, label:o.label||o.value }));
}

/* ============================================================
   초기화 - 앱 시작 시 자동 실행
============================================================ */
async function init(){
  setSyncStatus('loading','로딩중...');
  try{
    /* ★ 옵션을 가장 먼저 불러와야 함
       (뱃지 색상·드롭다운 목록이 전부 옵션에 의존하므로) */
    await loadOptions();
    await Promise.all([loadTasks(), loadExpenses()]);
    setSyncStatus('ok','연결됨');
  } catch(e){
    setSyncStatus('error','오류');
    toast('❌ '+e.message);
  }
}

/* ============================================================
   연결 상태 표시 (헤더 우측 점)
   state: 'ok' | 'loading' | 'error'
============================================================ */
function setSyncStatus(state, text){
  const dot = document.getElementById('syncDot');
  const sp  = document.getElementById('syncText');
  dot.className = 'sync-dot'+(state==='loading'?' loading':state==='error'?' error':'');
  sp.textContent = text;
}

/* ============================================================
   탭 전환 (업무일정표 ↔ 경비사용내역)
============================================================ */
function switchTab(tab){
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
  document.getElementById('tab-'+tab).classList.add('active');
  document.getElementById('panel-'+tab).classList.add('active');
}

/* ============================================================
   새로고침 버튼
============================================================ */
async function refreshAll(){
  const btn = document.getElementById('refreshBtn');
  if(btn){btn.textContent='↻ 로딩중...';btn.disabled=true;}
  setSyncStatus('loading','동기화중...');
  try{
    await Promise.all([loadTasks(), loadExpenses()]);
    setSyncStatus('ok','연결됨');
  } catch(e){ setSyncStatus('error','오류'); }
  if(btn){btn.textContent='↻ 새로고침';btn.disabled=false;}
}

/* ============================================================
   토스트 알림 (화면 하단 잠깐 나타나는 메시지)
   msg: 표시할 메시지, dur: 표시 시간(ms)
============================================================ */
function toast(msg, dur=2200){
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'), dur);
}

/* ============================================================
   유틸 함수들
============================================================ */
// 날짜 문자열 "YYYY-MM-DD" → "MM/DD" 형식으로 변환
function fmtDate(d){ if(!d) return '-'; const p=d.split('-'); return p.length>=3?p[1]+'/'+p[2]:d; }

// 숫자 → "1,234원" 형식으로 변환
function fmtMoney(n){ if(n===null||n===undefined||n==='') return '-'; return Number(n).toLocaleString('ko-KR')+'원'; }

// HTML 특수문자 이스케이프 (XSS 방지 + 따옴표 오류 방지)
function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

/* ============================================================
   상태 뱃지 HTML 생성
   상태 문자열에 따라 색깔 있는 뱃지를 만들어 반환
============================================================ */
function statusBadge(s){
  if(!s) return '<span style="color:#CCC">-</span>';
  const c = optColor('status', s);          /* DB에 저장된 색 */
  const l = optLabel('status', s);          /* DB에 저장된 표시명 */
  return '<span class="badge" style="background:'+c.bg+';color:'+c.fg+'">'+esc(l)+'</span>';
}

/* 진행상태 뱃지 (모델링/제작도/매뉴얼 공용) */
function pbadge(v){
  if(!v || v==='-') return '<span style="color:#CCC">-</span>';
  const c = optColor('prog', v);
  return '<span class="pb" style="background:'+c.bg+';color:'+c.fg+'">'+esc(optLabel('prog',v))+'</span>';
}

/* 업무강도 뱃지 */
function ibadge(v){
  if(!v) return '<span style="color:#CCC">-</span>';
  const c = optColor('intensity', v);
  return '<span class="ib" style="background:'+c.bg+';color:'+c.fg+'">'+esc(optLabel('intensity',v))+'</span>';
}

/* ============================================================
   SELECT 옵션 HTML 생성 헬퍼
   opts: 옵션 배열, cur: 현재 선택값, empty: 빈 옵션 라벨
============================================================ */
function mkOpts(opts, cur, empty=''){
  let h = empty ? '<option value="">'+empty+'</option>' : '';
  opts.forEach(o=>{
    const v=typeof o==='object'?o.val:o;
    const l=typeof o==='object'?o.label:o;
    h+='<option value="'+esc(v)+'" '+(cur===v?'selected':'')+'>'+l+'</option>';
  });
  return h;
}

/* ============================================================
   업무일정표 데이터 로드 (Supabase → taskData 배열)
============================================================ */
async function loadTasks(){
  const res = await fetch(SB_URL+'/rest/v1/task_schedule?order=created_at.asc', {headers:H});
  if(!res.ok) throw new Error('task load fail');
  taskData = await res.json();
  renderTask();
  updateSummary();
}

/* ============================================================
   요약 카드 숫자 업데이트
============================================================ */
function updateSummary(){
  const c={done:0,ing:0,hold:0,cont:0,req:0};
  taskData.forEach(t=>{
    const s=(t.status||'').toLowerCase();
    if(s.includes('완료'))      c.done++;
    else if(s.includes('진행중')) c.ing++;
    else if(s.includes('보류'))  c.hold++;
    else if(s.includes('지속'))  c.cont++;
    else if(s.includes('요청'))  c.req++;
  });
  document.getElementById('cnt-done').textContent=c.done;
  document.getElementById('cnt-ing').textContent=c.ing;
  document.getElementById('cnt-hold').textContent=c.hold;
  document.getElementById('cnt-cont').textContent=c.cont;
  document.getElementById('cnt-req').textContent=c.req;
  document.getElementById('cnt-all').textContent=taskData.length;
}

/* ============================================================
   정렬 함수
   컬럼 헤더 클릭 시 호출됨
   같은 컬럼 두 번 클릭하면 방향 반전
============================================================ */
function sortBy(col){
  if(sortCol===col) sortDir = sortDir==='asc'?'desc':'asc';
  else { sortCol=col; sortDir='asc'; }
  renderTask();
}

/* ============================================================
   데이터 정렬 로직
============================================================ */
function sortedData(data){
  return [...data].sort((a,b)=>{
    let va, vb;
    if(sortCol==='status'){
      // 상태는 커스텀 순서(STATUS_ORDER)로 정렬
      va = STATUS_ORDER[a.status] || 99;
      vb = STATUS_ORDER[b.status] || 99;
    } else {
      va = a[sortCol] || '';
      vb = b[sortCol] || '';
    }
    if(va<vb) return sortDir==='asc'?-1:1;
    if(va>vb) return sortDir==='asc'?1:-1;
    return 0;
  });
}

/* ============================================================
   정렬 표시 아이콘 생성
   현재 정렬 중인 컬럼에만 화살표 표시
============================================================ */
function sortIcon(col){
  if(sortCol!==col) return ' <span style="color:#CCC;font-size:10px">⇅</span>';
  return sortDir==='asc'
    ? ' <span style="color:var(--blueprint);font-size:10px">▲</span>'
    : ' <span style="color:var(--blueprint);font-size:10px">▼</span>';
}

/* ============================================================
   업무 테이블 렌더링 (엑셀 스타일 인라인 편집)

   동작 방식:
   - 기본: 뷰 모드 (텍스트/뱃지 표시)
   - 셀 클릭: 해당 셀만 편집 컨트롤로 전환
   - 행 밖 클릭 / Enter: 자동 저장
   - 헤더 클릭: 해당 컬럼 기준 정렬
============================================================ */
function renderTask(){
  const search=(document.getElementById('taskSearch').value||'').toLowerCase();
  const fSt=document.getElementById('fStatus').value;
  const fLd=document.getElementById('fLead').value;

  // 필터 적용
  let filtered=taskData.filter(t=>{
    const ms=!search||(t.title||'').toLowerCase().includes(search)
      ||(t.lead||'').toLowerCase().includes(search)
      ||(t.location||'').toLowerCase().includes(search)
      ||(t.sub||'').toLowerCase().includes(search)
      ||(t.sales||'').toLowerCase().includes(search);
    const mst=!fSt||(t.status||'').toLowerCase().includes(fSt.toLowerCase());
    const mld=!fLd||t.lead===fLd;
    return ms&&mst&&mld;
  });

  // 정렬 적용
  filtered = sortedData(filtered);

  /* ------------------------------------------------------------
     헤더 컬럼 정의: [표시명, 정렬키, 기본너비(px), 옵션종류]
     - 정렬키가 null 이면 헤더 클릭 정렬 안 됨
     - 옵션종류가 있으면 헤더에 ⚙(옵션관리) 버튼이 붙음
     ★ 모델링/제작도/매뉴얼 3개 → "진행상태" 1칸으로 합쳤습니다
  ------------------------------------------------------------ */
  const cols=[
    ['상태',                'status',       80,  'status'   ],
    ['주담당자',            'lead',         72,  'lead'     ],
    ['보조담당자',          'sub',          90,  'sub'      ],
    ['프로젝트명 / 업무내용','title',        240, null       ],
    ['출고지',              'location',     68,  null       ],
    ['요청일',              'request_date', 74,  null       ],  /* 영업이 업무를 준 날 */
    ['요청마감',            'deadline',     74,  null       ],  /* 영업이 정한 마감일 */
    ['시작일',              'start_date',   74,  null       ],  /* 실제 업무 시작일 */
    ['종료일',              'end_date',     74,  null       ],  /* 실제 업무 종료일 */
    ['D-day',               'dday',         50,  null       ],
    ['리드타임',            'lead_time',    54,  null       ],  /* 요청마감 - 요청일 */
    ['워크타임',            'work_time',    54,  null       ],  /* 종료일 - 시작일 */
    ['세이브타임',          'save_time',    60,  null       ],  /* 리드 - 워크 */
    ['영업담당',            'sales',        72,  'sales'    ],
    ['분류',                'category',     76,  'category' ],
    ['진행상태',            null,           150, 'prog'     ],  /* 모델링+제작도+매뉴얼 */
    ['강도',                'intensity',    140, 'intensity'],
    ['삭제',                null,           44,  null       ],
  ];

  /* ---- 표 맨 위 "+ 업무 추가" 가로 전체 버튼 ----
     thead 안에 td colspan 으로 넣어서 표 폭 전체를 차지하게 함 */
  const addBtnRow =
    '<tr><td colspan="'+cols.length+'" style="padding:0;border:none">'
    +'<button class="add-row-btn" onclick="quickAddTask()">'
    +'<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">'
    +'<line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>'
    +'업무 추가</button></td></tr>';

  /* 조건에 맞는 게 없어도 "추가" 버튼은 보여야 하므로 표는 항상 그립니다 */
  if(!filtered.length){
    document.getElementById('taskTableWrap').innerHTML=
      '<table><thead>'+addBtnRow+'</thead></table>'
      +'<div class="empty-msg">📭 조건에 맞는 업무가 없습니다.</div>';
    return;
  }

  let html='<table><thead>'+addBtnRow+'<tr>';
  cols.forEach(([label,key,w,optType])=>{
    /* ⚙ 버튼: 그 컬럼의 선택지를 추가/삭제/색상변경/순서변경 */
    const gear = optType
      ? ' <button class="gear-btn" onclick="event.stopPropagation();openOptModal(\'' + optType + '\')" title="'+OPT_TITLE[optType]+' 옵션 관리">⚙</button>'
      : '';
    if(key){
      html+='<th style="width:'+w+'px;cursor:pointer" onclick="sortBy(\''+key+'\')">'
        +label+sortIcon(key)+gear+'</th>';
    } else {
      html+='<th style="width:'+w+'px">'+label+gear+'</th>';
    }
  });
  html+='</tr></thead><tbody>';

  filtered.forEach(t=>{
    const id = t.id;
    const ddayVal=(t.dday!==null&&t.dday!==undefined&&t.dday!==-33015)?t.dday:null;
    const ddayTxt=ddayVal===null?'-':ddayVal>=0?'D+'+ddayVal:'D'+ddayVal;
    const ddayStyle=ddayVal!==null&&ddayVal>=0&&ddayVal<=7?'color:#D48806;font-weight:700':
                    ddayVal!==null&&ddayVal<0&&(t.status||'').includes('진행')?'color:var(--danger);font-weight:700':'';

    /* 상태에 따라 행 배경색 결정 */
    const rowCls = (t.status||'').includes('완료') ? 'row-done'
                 : (t.status||'').includes('진행중') ? 'row-ing'
                 : (t.status||'').includes('지속') ? 'row-cont'
                 : (t.status||'').includes('보류') ? 'row-hold'
                 : (t.status||'').includes('요청') ? 'row-req' : '';

    /* 파생값 계산 (날짜 차이, 단위: 일) */
    const diffDays = (a, b) => {
      if (!a || !b) return null;
      return Math.round((new Date(b) - new Date(a)) / 86400000);
    };
    const lt = t.lead_time   || diffDays(t.request_date, t.deadline);
    const wt = t.work_time   || diffDays(t.start_date, t.end_date);
    const st = t.save_time   !== undefined && t.save_time !== null ? t.save_time
             : (lt !== null && wt !== null ? lt - wt : null);

    html+='<tr id="row-'+id+'" class="'+rowCls+'">';

    /* ---- 상태: 뱃지 클릭 → 드롭다운 팝업 ---- */
    html+=tdDropdown(id,'status',t.status,'center');
    /* ---- 주담당자 ---- */
    html+=tdDropdown(id,'lead',t.lead,'center');
    /* ---- 보조담당자 ---- */
    html+=tdDropdown(id,'sub',t.sub,'center');

    /* ---- 프로젝트명: 클릭하면 바로 타이핑 (contenteditable) ---- */
    html+=tdText(id,'title',t.title,'업무내용 입력');

    /* ---- 출고지 ---- */
    html+=tdText(id,'location',t.location,'출고지');

    /* ---- 날짜 4개: 항상 달력 입력칸이 보임 ---- */
    html+=tdDate(id,'request_date',t.request_date);
    html+=tdDate(id,'deadline',    t.deadline);
    html+=tdDate(id,'start_date',  t.start_date);
    html+=tdDate(id,'end_date',    t.end_date);

    /* ---- D-day: 자동계산이라 읽기전용 ---- */
    html+='<td><div class="c-box" style="justify-content:center;font-size:12px;'+ddayStyle+'">'+ddayTxt+'</div></td>';

    /* ---- 파생값 3개: 읽기전용 ---- */
    html+='<td><div class="dval">'+(lt!==null?lt+'일':'-')+'</div></td>';
    html+='<td><div class="dval">'+(wt!==null?wt+'일':'-')+'</div></td>';
    html+='<td><div class="dval '+(st===null?'':(st>=0?'save-pos':'save-neg'))+'">'+(st!==null?st+'일':'-')+'</div></td>';

    /* ---- 영업담당 / 분류 ---- */
    html+=tdDropdown(id,'sales',t.sales,'center');
    html+=tdDropdown(id,'category',t.category,'center');

    /* ---- 진행상태: 모델링/제작도/매뉴얼 3줄을 한 칸 안에 ----
       각 줄마다 토글 버튼이 따로 있어서 독립적으로 클릭 가능 */
    html+='<td><div class="prog-group">'
      + progRow(id,'modeling','모델링', t.modeling)
      + progRow(id,'drawing', '제작도', t.drawing)
      + progRow(id,'manual',  '매뉴얼', t.manual)
      + '</div></td>';

    /* ---- 강도: 토글 버튼 그룹 (선택한 것만 불 켜짐) ---- */
    html+='<td>'+togGroup(id,'intensity','intensity',t.intensity)+'</td>';

    /* ---- 삭제 ---- */
    html+='<td style="padding:5px 6px;text-align:center">'
      +'<button class="btn-row-del" onclick="deleteTask(\''+id+'\')">🗑</button>'
      +'</td>';

    html+='</tr>';
  });

  html+='</tbody></table>';
  document.getElementById('taskTableWrap').innerHTML=html;

  /* 표를 새로 그렸으니 컬럼 폭 조절 손잡이도 다시 붙임 */
  initColResize();
}

/* ============================================================
   ★ 셀 생성 헬퍼들 ★
   행 전체가 아니라 "셀 하나"만 편집되도록 만드는 부품들입니다.
============================================================ */

/* ---- 글자 입력 셀 ----
   contenteditable="true" → 클릭하면 그 자리에서 바로 타이핑
   onblur(칸 밖 클릭) 시 자동 저장 */
function tdText(id, field, value, placeholder){
  return '<td><div class="c-box"><div class="c-text" contenteditable="true"'
    +' data-ph="'+placeholder+'"'
    +' title="'+esc(value)+'"'
    +' onblur="saveField(\''+id+'\',\''+field+'\',this.innerText.trim())"'
    +' onkeydown="textCellKey(event,this)"'
    +'>'+esc(value)+'</div></div></td>';
}

/* 글자 셀에서 Enter=저장(줄바꿈 방지), Esc=취소 */
function textCellKey(e, el){
  if(e.key==='Enter'){ e.preventDefault(); el.blur(); }
  if(e.key==='Escape'){ e.preventDefault(); renderTask(); }
}

/* ---- 날짜 입력 셀 ---- */
function tdDate(id, field, value){
  return '<td><div class="c-box" style="justify-content:center">'
    +'<input type="date" class="c-date" value="'+(value||'')+'"'
    +' onchange="saveField(\''+id+'\',\''+field+'\',this.value||null)">'
    +'</div></td>';
}

/* ---- 드롭다운 셀 (상태/담당자/영업/분류) ----
   평소엔 뱃지만 보이다가, 클릭하면 팝업이 뜹니다.
   ★ 팝업은 표 밖(body)에 fixed로 뜨므로 절대 잘리지 않습니다 */
function tdDropdown(id, field, value, align='left'){
  const type = field;                 /* 필드명 = 옵션 종류명 (동일하게 맞춰둠) */
  const c = optColor(type, value);
  const l = value ? optLabel(type, value) : '-';
  const badge = value
    ? '<span class="badge" style="background:'+c.bg+';color:'+c.fg+'">'+esc(l)+'</span>'
    : '<span style="color:#CCC">-</span>';
  return '<td><div class="c-box" style="justify-content:'+align+'">'
    +'<span class="dd-btn" onclick="openDD(event,\''+id+'\',\''+field+'\')">'+badge+'</span>'
    +'</div></td>';
}

/* ---- 토글 버튼 그룹 ----
   선택지를 전부 나열하고, 지금 값인 것만 색이 켜집니다. */
function togGroup(id, field, type, value, extraStyle=''){
  let h='<div class="tog-group" style="'+extraStyle+'">';
  (OPTIONS[type]||[]).forEach(o=>{
    const on = (value === o.value);
    /* 켜진 버튼만 DB에 저장된 색을 입힘 */
    const st = on ? 'background:'+o.color_bg+';color:'+o.color_fg+';border-color:'+o.color_bg+';' : '';
    h+='<span class="tog'+(on?' on':'')+'" style="'+st+'"'
      +' onclick="saveField(\''+id+'\',\''+field+'\',\''+esc(o.value).replace(/'/g,"\\'")+'\')">'
      +esc(o.label||o.value)+'</span>';
  });
  return h+'</div>';
}

/* ---- 진행상태 한 줄 (라벨 + 토글버튼들) ---- */
function progRow(id, field, label, value){
  return '<div class="prog-row"><span class="prog-lbl">'+label+'</span>'
    + togGroup(id, field, 'prog', value, 'padding:0;gap:2px;')
    + '</div>';
}

/* ============================================================
   ★ 셀 하나만 저장 (PATCH) ★
   예전엔 행 전체를 한꺼번에 저장했지만, 이제 바뀐 칸 하나만 저장합니다.
   id: 행 UUID / field: 컬럼명 / value: 새 값
============================================================ */
async function saveField(id, field, value){
  const row = taskData.find(x=>x.id===id);
  if(!row) return;
  const newVal = (value === '' ? null : value);
  if(row[field] === newVal) return;            /* 안 바뀌었으면 저장 안 함 */

  setSyncStatus('loading','저장중...');
  try{
    const res = await fetch(SB_URL+'/rest/v1/task_schedule?id=eq.'+id,
      {method:'PATCH', headers:H, body:JSON.stringify({[field]:newVal})});
    if(!res.ok) throw new Error(await res.text());

    /* 로컬 캐시 즉시 반영 → 새로고침 없이 화면에 바로 적용 */
    row[field] = newVal;

    renderTask();
    updateSummary();
    setSyncStatus('ok','연결됨');
  } catch(e){
    setSyncStatus('error','오류');
    toast('❌ 저장 실패: '+e.message);
  }
}

/* ============================================================
   ★ 표 맨 위 "+ 업무 추가" — 빈 행을 바로 추가 ★
   모달 없이 즉시 행이 생기고, 프로젝트명 칸에 커서가 갑니다.
============================================================ */
async function quickAddTask(){
  const firstStatus = OPTIONS.status[0] ? OPTIONS.status[0].value : '1. 요청';
  setSyncStatus('loading','추가중...');
  try{
    const res = await fetch(SB_URL+'/rest/v1/task_schedule',
      {method:'POST', headers:{...H,'Prefer':'return=representation'},
       body:JSON.stringify({status:firstStatus})});
    if(!res.ok) throw new Error(await res.text());
    const [created] = await res.json();
    taskData.push(created);
    renderTask(); updateSummary();
    setSyncStatus('ok','연결됨');
    /* 새로 생긴 행의 프로젝트명 칸에 커서 놓기 */
    setTimeout(()=>{
      const tr = document.getElementById('row-'+created.id);
      if(tr){
        tr.scrollIntoView({block:'center', behavior:'smooth'});
        const cell = tr.querySelectorAll('.c-text')[0];
        if(cell) cell.focus();
      }
    }, 80);
  } catch(e){
    setSyncStatus('error','오류');
    toast('❌ 추가 실패: '+e.message);
  }
}

/* ============================================================
   업무 삭제
============================================================ */
async function deleteTask(id){
  if(!confirm('정말 삭제하시겠습니까?')) return;
  setSyncStatus('loading','삭제중...');
  try{
    const res=await fetch(SB_URL+'/rest/v1/task_schedule?id=eq.'+id,{method:'DELETE',headers:H});
    if(!res.ok) throw new Error();
    taskData=taskData.filter(x=>x.id!==id);
    renderTask(); updateSummary();
    setSyncStatus('ok','연결됨');
    toast('🗑️ 삭제되었습니다.');
  } catch(e){ setSyncStatus('error','오류'); toast('❌ 삭제 실패'); }
}

/* ============================================================
   예산 현황 바 업데이트
============================================================ */
function updateBudget(){
  const TOTAL=1080000;
  const spent=expData.reduce((s,e)=>s+(Number(e.amount)||0),0);
  const remain=TOTAL-spent;
  const rate=Math.min(100,Math.round(spent/TOTAL*100));
  document.getElementById('bTotal').textContent=fmtMoney(TOTAL);
  document.getElementById('bSpent').textContent=fmtMoney(spent);
  document.getElementById('bRemain').textContent=fmtMoney(remain);
  document.getElementById('bRate').textContent=rate+'%';
  document.getElementById('bBar').style.width=rate+'%';
}

function startEditExp(id){
  if(editingExpId===id) return;
  if(editingExpId) saveExpRow(editingExpId, true);
  editingExpId=id;
  renderExpense();
}

let _expTimer=null;
function autoSaveExp(id){
  clearTimeout(_expTimer);
  _expTimer=setTimeout(()=>saveExpRow(id,true),200);
}

async function saveExpRow(id, silent=false){
  if(editingExpId!==id) return;
  const gv=sid=>(document.getElementById(sid+id)||{}).value||null;
  const amount=Number(gv('eem-'));
  if(!amount){ if(!silent) toast('⚠️ 집행액을 입력하세요.'); return; }
  const TOTAL=1080000;
  const prevSpent=expData.filter(e=>e.id!==id).reduce((s,e)=>s+(Number(e.amount)||0),0);
  const newBal=TOTAL-prevSpent-amount;
  const payload={
    used_date:gv('eed-')||null, expense_type:gv('eet-'),
    attendees:Number(gv('eea-'))||null,
    amount, balance:newBal, note:gv('een-'),
  };
  setSyncStatus('loading','저장중...');
  try{
    const res=await fetch(SB_URL+'/rest/v1/dept_expense?id=eq.'+id,
      {method:'PATCH',headers:H,body:JSON.stringify(payload)});
    if(!res.ok) throw new Error(await res.text());
    const idx=expData.findIndex(x=>x.id===id);
    if(idx>=0) expData[idx]={...expData[idx],...payload};
    editingExpId=null;
    renderExpense(); updateBudget();
    setSyncStatus('ok','연결됨');
    if(!silent) toast('✅ 저장되었습니다.');
  } catch(e){ setSyncStatus('error','오류'); if(!silent) toast('❌ 저장 실패: '+e.message); }
}

async function deleteExp(id){
  if(!confirm('정말 삭제하시겠습니까?')) return;
  try{
    const res=await fetch(SB_URL+'/rest/v1/dept_expense?id=eq.'+id,{method:'DELETE',headers:H});
    if(!res.ok) throw new Error();
    expData=expData.filter(x=>x.id!==id);
    if(editingExpId===id) editingExpId=null;
    renderExpense(); updateBudget();
    toast('🗑️ 삭제되었습니다.');
  } catch(e){ toast('❌ 삭제 실패'); }
}

async function addExpense(){
  const g=id=>(document.getElementById(id)||{}).value||null;
  const amount=Number(g('ef-amount'));
  if(!amount){ toast('⚠️ 집행액을 입력하세요.'); return; }
  const TOTAL=1080000;
  const prevSpent=expData.reduce((s,e)=>s+(Number(e.amount)||0),0);
  const maxSeq=expData.length?Math.max(...expData.map(e=>e.seq||0)):0;
  const payload={
    seq:maxSeq+1, used_date:g('ef-date')||null, expense_type:g('ef-type'),
    attendees:Number(g('ef-att'))||null,
    budget_limit:TOTAL-prevSpent, amount, balance:TOTAL-prevSpent-amount,
    note:g('ef-note'),
  };
  setSyncStatus('loading','저장중...');
  try{
    const res=await fetch(SB_URL+'/rest/v1/dept_expense',{method:'POST',headers:H,body:JSON.stringify(payload)});
    if(!res.ok) throw new Error(await res.text());
    const added=await res.json();
    expData.push(added[0]);
    closeModal(); renderExpense(); updateBudget();
    setSyncStatus('ok','연결됨');
    toast('✅ 경비가 추가되었습니다.');
  } catch(e){ setSyncStatus('error','오류'); toast('❌ 추가 실패: '+e.message); }
}

   배경 클릭해도 닫히지 않음 - X버튼/취소버튼만 닫힘
============================================================ */
function openModal(title, bodyHtml, footerHtml=''){
  const root=document.getElementById('modalRoot');
  root.innerHTML=
    '<div class="modal-overlay open" id="modalOverlay">'
    +'<div class="modal-panel">'
    +'<div class="modal-header"><h3>'+title+'</h3>'
    +'<button class="modal-close" onclick="closeModal()">✕</button></div>'
    +'<div class="modal-body">'+bodyHtml+'</div>'
    +(footerHtml?'<div class="modal-footer">'+footerHtml+'</div>':'')
    +'</div></div>';

  // Enter 키 → primary 버튼 실행
  document.getElementById('modalOverlay').addEventListener('keydown',e=>{
    if(e.key==='Enter'&&e.target.tagName!=='TEXTAREA'){
      const btn=document.querySelector('#modalOverlay .btn.primary');
      if(btn) btn.click();
    }
    if(e.key==='Escape') closeModal();
  });
}
function closeModal(){ document.getElementById('modalRoot').innerHTML=''; }

/* ============================================================
   ★ 드롭다운 팝업 ★
   뱃지를 클릭하면 그 뱃지 바로 아래에 선택지 목록이 뜹니다.
   팝업은 표 안이 아니라 화면(body) 기준으로 뜨기 때문에
   표 바깥으로 나가도 잘리지 않습니다. (position:fixed)
============================================================ */
let ddCtx = { id:null, field:null };   /* 지금 어느 셀의 팝업이 열려있는지 */

function openDD(e, id, field){
  e.stopPropagation();
  const popup = document.getElementById('ddPopup');

  /* 같은 셀을 또 누르면 닫기 */
  if(popup.classList.contains('open') && ddCtx.id===id && ddCtx.field===field){
    closeDD(); return;
  }
  ddCtx = { id, field };

  const type = field;
  const row  = taskData.find(x=>x.id===id);
  const cur  = row ? row[field] : null;

  /* 선택지 목록 만들기 (+ 맨 위에 "비우기" 항목) */
  let h = '<div class="dd-item'+(!cur?' selected':'')+'" onclick="pickDD(null)">'
        + '<span style="color:#BBB;font-size:12px">— 비우기 —</span></div>';
  (OPTIONS[type]||[]).forEach(o=>{
    const sel = (cur===o.value) ? ' selected' : '';
    h += '<div class="dd-item'+sel+'" onclick="pickDD(\''+esc(o.value).replace(/'/g,"\\'")+'\')">'
       + '<span class="badge" style="background:'+o.color_bg+';color:'+o.color_fg+'">'
       + esc(o.label||o.value)+'</span></div>';
  });
  popup.innerHTML = h;

  /* 클릭한 뱃지 바로 아래에 팝업 위치시키기 */
  const r = e.currentTarget.getBoundingClientRect();
  popup.classList.add('open');
  /* 화면 아래로 넘치면 위쪽에 띄움 */
  const ph = popup.offsetHeight;
  const top = (r.bottom + ph + 8 > window.innerHeight) ? (r.top - ph - 4) : (r.bottom + 4);
  popup.style.top  = Math.max(4, top) + 'px';
  popup.style.left = Math.min(r.left, window.innerWidth - popup.offsetWidth - 8) + 'px';
}

/* 팝업에서 항목을 고르면 → 저장 */
function pickDD(value){
  const { id, field } = ddCtx;
  closeDD();
  if(id && field) saveField(id, field, value);
}

function closeDD(){
  document.getElementById('ddPopup').classList.remove('open');
  ddCtx = { id:null, field:null };
}

/* 빈 곳을 클릭하면 팝업 닫기 */
document.addEventListener('click', e=>{
  if(!e.target.closest('.dd-btn') && !e.target.closest('#ddPopup')) closeDD();
});
/* 스크롤하면 팝업 위치가 틀어지므로 닫기 */
window.addEventListener('scroll', closeDD, true);

    const raw = (o.value !== label) ? '<span style="font-size:11px;color:var(--muted)">('+esc(o.value)+')</span>' : '';
    return '<div class="opt-item" draggable="true"'
      +' ondragstart="optDragStart(event,'+i+')" ondragover="optDragOver(event,'+i+')"'
      +' ondragleave="optDragLeave(event)" ondrop="optDrop(event,'+i+')" ondragend="optDragEnd(event)">'
      +'<div class="opt-top">'
      +'<span class="drag-handle" title="끌어서 순서 변경">⠿</span>'
      +'<span class="badge" style="background:'+o.color_bg+';color:'+o.color_fg+'">'+esc(label)+'</span>'
      +raw
      +'<button class="opt-del" onclick="delOpt('+i+')" title="삭제">✕</button>'
      +'</div>'
      +'<div class="color-row">'+dots+'</div>'
      +'</div>';
  }).join('');
}

/* ---- 색상 변경 ---- */
async function setOptColor(i, pi, dotEl){
  const o = OPTIONS[optType][i];
  const p = PALETTES[pi];
  o.color_bg = p.bg; o.color_fg = p.fg;
  /* 화면 먼저 갱신 (반응 빠르게) */
  dotEl.closest('.color-row').querySelectorAll('.color-dot')
    .forEach((d,k)=>d.classList.toggle('selected', k===pi));
  const badge = dotEl.closest('.opt-item').querySelector('.badge');
  badge.style.background = p.bg; badge.style.color = p.fg;
  /* DB 저장 */
  await patchOpt(o.id, {color_bg:p.bg, color_fg:p.fg});
}

/* ---- 옵션 추가 ---- */
async function addOpt(){
  const val = document.getElementById('optInput').value.trim();
  if(!val) return;
  if((OPTIONS[optType]||[]).some(o=>o.value===val)){ toast('❗ 이미 있는 항목입니다'); return; }
  const order = (OPTIONS[optType]||[]).length + 1;
  setSyncStatus('loading','추가중...');
  try{
    const res = await fetch(SB_URL+'/rest/v1/app_options',
      {method:'POST', headers:{...H,'Prefer':'return=representation'},
       body:JSON.stringify({opt_type:optType, value:val, label:val,
                            color_bg:'#F0F0F0', color_fg:'#555555', sort_order:order})});
    if(!res.ok) throw new Error(await res.text());
    const [created] = await res.json();
    OPTIONS[optType].push(created);
    document.getElementById('optInput').value='';
    renderOptList();
    setSyncStatus('ok','연결됨');
  }catch(e){ setSyncStatus('error','오류'); toast('❌ 추가 실패: '+e.message); }
}

/* ---- 옵션 삭제 ---- */
async function delOpt(i){
  const o = OPTIONS[optType][i];
  if(!confirm('"'+(o.label||o.value)+'" 항목을 삭제할까요?\n\n※ 이미 이 값을 쓰고 있는 업무는 그대로 남아있지만,\n   목록에서는 더 이상 고를 수 없게 됩니다.')) return;
  setSyncStatus('loading','삭제중...');
  try{
    const res = await fetch(SB_URL+'/rest/v1/app_options?id=eq.'+o.id, {method:'DELETE', headers:H});
    if(!res.ok) throw new Error(await res.text());
    OPTIONS[optType].splice(i,1);
    renderOptList();
    setSyncStatus('ok','연결됨');
  }catch(e){ setSyncStatus('error','오류'); toast('❌ 삭제 실패'); }
}

/* 옵션 한 건 수정 (PATCH) */
async function patchOpt(optId, payload){
  try{
    await fetch(SB_URL+'/rest/v1/app_options?id=eq.'+optId,
      {method:'PATCH', headers:H, body:JSON.stringify(payload)});
  }catch(e){ toast('❌ 저장 실패'); }
}


/* ============================================================
   ★ 옵션 순서 드래그앤드롭 ★
   ⠿ 손잡이를 잡고 끌어서 순서를 바꿉니다.
   위/아래 절반을 따지지 않고, 그냥 "놓은 자리"로 이동시킵니다.
   (splice가 방향을 알아서 처리해줍니다)
============================================================ */
let optDragFrom = null;

function optDragStart(e, i){
  optDragFrom = i;
  e.currentTarget.classList.add('dragging');
  e.dataTransfer.effectAllowed = 'move';
}
function optDragOver(e, i){
  e.preventDefault();                       /* 이게 없으면 drop이 안 일어남 */
  if(optDragFrom===null || optDragFrom===i) return;
  clearOptMarks();
  e.currentTarget.classList.add('drop-target');   /* 놓일 자리에 파란 테두리 */
}
function optDragLeave(e){ e.currentTarget.classList.remove('drop-target'); }
function optDragEnd(e){ e.currentTarget.classList.remove('dragging'); clearOptMarks(); optDragFrom=null; }
function clearOptMarks(){
  document.querySelectorAll('.opt-item').forEach(el=>el.classList.remove('drop-target'));
}

async function optDrop(e, i){
  e.preventDefault();
  clearOptMarks();
  if(optDragFrom===null || optDragFrom===i) return;

  const arr = OPTIONS[optType];
  const [moved] = arr.splice(optDragFrom, 1);   /* 빼서 */
  arr.splice(i, 0, moved);                      /* 놓은 자리에 끼워넣기 */
  optDragFrom = null;
  renderOptList();

  /* 바뀐 순서를 DB에 저장 (sort_order 를 1,2,3... 으로 다시 매김) */
  setSyncStatus('loading','순서 저장중...');
  try{
    await Promise.all(arr.map((o,idx)=>{
      o.sort_order = idx+1;
      return patchOpt(o.id, {sort_order: idx+1});
    }));
    setSyncStatus('ok','연결됨');
  }catch(err){ setSyncStatus('error','오류'); }
}


/* ============================================================
   ★ 컬럼 폭 조절 (엑셀처럼 경계선 끌기) ★
   - 표 전체 폭은 고정 (양끝은 안 움직임)
   - 어떤 경계선을 끌면, 왼쪽 칸이 넓어진 만큼 오른쪽 칸이 좁아짐
   - 너비는 th가 아니라 colgroup>col 로 조절해야 브라우저가 확실히 따릅니다
============================================================ */
function initColResize(){
  const tbl = document.querySelector('#taskTableWrap table');
  if(!tbl) return;

  /* thead 안에 "추가 버튼 줄"과 "진짜 헤더 줄" 2개가 있으므로
     :last-child 로 진짜 헤더 줄만 정확히 집습니다 */
  const ths = [...tbl.querySelectorAll('thead tr:last-child th')];
  if(ths.length < 2) return;

  /* colgroup(col 묶음)을 만들어서 각 컬럼 너비를 % 로 지정 */
  let cg = tbl.querySelector('colgroup');
  if(!cg){
    cg = document.createElement('colgroup');
    const total = tbl.getBoundingClientRect().width || 1;
    ths.forEach(th=>{
      const col = document.createElement('col');
      col.style.width = (th.getBoundingClientRect().width / total * 100).toFixed(2)+'%';
      cg.appendChild(col);
    });
    tbl.insertBefore(cg, tbl.firstChild);
  }
  const cols = [...cg.querySelectorAll('col')];

  ths.forEach((th, i)=>{
    if(th.querySelector('.col-resizer')) return;   /* 이미 붙어있으면 건너뜀 */
    if(i === ths.length - 1) return;               /* ★ 맨 오른쪽 끝은 고정 */

    const handle = document.createElement('div');
    handle.className = 'col-resizer';
    th.appendChild(handle);

    handle.addEventListener('mousedown', e=>{
      e.preventDefault(); e.stopPropagation();     /* 헤더 클릭(정렬) 방지 */
      const x0    = e.clientX;
      const total = tbl.getBoundingClientRect().width;
      const w0    = ths[i].getBoundingClientRect().width;      /* 왼쪽 칸 */
      const w1    = ths[i+1].getBoundingClientRect().width;    /* 오른쪽 칸 */
      handle.classList.add('dragging');
      document.body.style.cursor = 'col-resize';
      document.body.style.userSelect = 'none';

      const onMove = e2=>{
        const d  = e2.clientX - x0;
        const nw = w0 + d;      /* 왼쪽 칸 새 너비 */
        const nn = w1 - d;      /* 오른쪽 칸 새 너비 (합은 그대로 유지) */
        if(nw >= 40 && nn >= 40){                 /* 최소 40px 보장 */
          cols[i].style.width   = (nw/total*100).toFixed(2)+'%';
          cols[i+1].style.width = (nn/total*100).toFixed(2)+'%';
        }
      };
      const onUp = ()=>{
        handle.classList.remove('dragging');
        document.body.style.cursor = '';
        document.body.style.userSelect = '';
        document.removeEventListener('mousemove', onMove);
        document.removeEventListener('mouseup', onUp);
      };
      document.addEventListener('mousemove', onMove);
      document.addEventListener('mouseup', onUp);
    });
  });
}
