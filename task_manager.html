<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>기술전략팀 업무관리</title>
<style>
  /* =============================================
     전체 기본 설정
     글꼴, 색상, 여백 등 앱 전반에 적용되는 기본값
  ============================================= */
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Pretendard', 'Noto Sans KR', sans-serif;
    background: #F5F6FA;
    color: #222;
    font-size: 14px;
    /* 모바일에서 단어가 이상하게 잘리지 않도록 */
    word-break: keep-all;
    overflow-wrap: break-word;
  }

  /* =============================================
     헤더 영역
     상단 타이틀 + 탭 버튼 + 새로고침 버튼
  ============================================= */
  .header {
    background: #fff;
    border-bottom: 1px solid #E8E8EE;
    padding: 0 20px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  }

  .header-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 0 10px;
    gap: 12px;
  }

  /* 헤더 타이틀 텍스트 */
  .header-title {
    font-size: 17px;
    font-weight: 700;
    color: #1A1A2E;
    white-space: nowrap;
    letter-spacing: -0.3px;
  }

  .header-title span {
    color: #7C5CBF;
  }

  /* 오른쪽 상단 버튼 그룹 */
  .header-actions {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }

  /* =============================================
     새로고침 버튼 - 분홍 pill 스타일 (표준)
  ============================================= */
  .btn-refresh {
    display: flex;
    align-items: center;
    gap: 5px;
    padding: 7px 16px;
    border: 1px solid #F3C1D3;
    border-radius: 7px;
    background: #FFF3F7;
    color: #D6336C;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    white-space: nowrap;
    transition: background 0.15s;
  }
  .btn-refresh:hover { background: #FFE4EF; }

  /* 새로고침 아이콘 회전 애니메이션 */
  .btn-refresh svg { transition: transform 0.6s ease; }
  .btn-refresh.spinning svg { transform: rotate(360deg); }

  /* =============================================
     탭 전환 버튼 (업무일정표 / 경비사용내역)
  ============================================= */
  .tabs {
    display: flex;
    gap: 0;
    border-bottom: none;
    padding-bottom: 0;
  }

  .tab-btn {
    padding: 10px 20px;
    background: none;
    border: none;
    border-bottom: 3px solid transparent;
    font-size: 14px;
    font-weight: 600;
    color: #999;
    cursor: pointer;
    white-space: nowrap;
    transition: color 0.15s, border-color 0.15s;
  }
  .tab-btn.active {
    color: #7C5CBF;
    border-bottom-color: #7C5CBF;
  }
  .tab-btn:hover:not(.active) { color: #555; }

  /* =============================================
     메인 콘텐츠 영역
  ============================================= */
  .main {
    padding: 20px;
    max-width: 1600px;
    margin: 0 auto;
  }

  /* 탭 패널 - active 아닌 건 숨김 */
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  /* =============================================
     요약 카드 영역 (상태별 카운트 등)
  ============================================= */
  .summary-cards {
    display: flex;
    gap: 12px;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }

  .summary-card {
    background: #fff;
    border-radius: 10px;
    padding: 14px 20px;
    border: 1px solid #EBEBF0;
    min-width: 120px;
    flex: 1;
  }

  .summary-card .label {
    font-size: 12px;
    color: #999;
    margin-bottom: 4px;
    font-weight: 500;
  }

  .summary-card .value {
    font-size: 22px;
    font-weight: 700;
    color: #1A1A2E;
  }

  .summary-card.done .value { color: #2E86AB; }
  .summary-card.ing .value { color: #7C5CBF; }
  .summary-card.hold .value { color: #F0A500; }
  .summary-card.cont .value { color: #3DAA75; }

  /* =============================================
     필터/검색 툴바
  ============================================= */
  .toolbar {
    background: #fff;
    border: 1px solid #EBEBF0;
    border-radius: 10px;
    padding: 12px 16px;
    margin-bottom: 16px;
    display: flex;
    gap: 10px;
    align-items: center;
    flex-wrap: wrap;
  }

  /* 검색 입력창 */
  .search-input {
    flex: 1;
    min-width: 160px;
    padding: 8px 12px;
    border: 1px solid #DDD;
    border-radius: 7px;
    font-size: 13px;
    outline: none;
    transition: border-color 0.15s;
  }
  .search-input:focus { border-color: #7C5CBF; }

  /* 필터 셀렉트 박스 */
  .filter-select {
    padding: 8px 12px;
    border: 1px solid #DDD;
    border-radius: 7px;
    font-size: 13px;
    background: #fff;
    outline: none;
    cursor: pointer;
    color: #444;
  }
  .filter-select:focus { border-color: #7C5CBF; }

  /* 추가 버튼 */
  .btn-add {
    padding: 8px 16px;
    background: #7C5CBF;
    color: #fff;
    border: none;
    border-radius: 7px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    white-space: nowrap;
    transition: background 0.15s;
  }
  .btn-add:hover { background: #6A4DAD; }

  /* =============================================
     테이블 공통 스타일
  ============================================= */
  .table-wrap {
    background: #fff;
    border: 1px solid #EBEBF0;
    border-radius: 10px;
    overflow: hidden;
    overflow-x: auto;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    min-width: 900px;
  }

  thead th {
    background: #F7F5FF;
    padding: 11px 12px;
    font-size: 12px;
    font-weight: 700;
    color: #7C5CBF;
    text-align: left;
    border-bottom: 1px solid #E8E4F8;
    white-space: nowrap;
  }

  tbody tr {
    border-bottom: 1px solid #F0F0F5;
    transition: background 0.1s;
  }
  tbody tr:hover { background: #FAFAFF; }
  tbody tr:last-child { border-bottom: none; }

  tbody td {
    padding: 10px 12px;
    font-size: 13px;
    color: #333;
    vertical-align: middle;
  }

  /* =============================================
     상태 뱃지 (완료/진행중/보류/지속적진행)
  ============================================= */
  .badge {
    display: inline-block;
    padding: 3px 9px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 700;
    white-space: nowrap;
  }
  .badge-done    { background: #E3F4FB; color: #2E86AB; }
  .badge-ing     { background: #F0EBFF; color: #7C5CBF; }
  .badge-hold    { background: #FFF5E0; color: #D48806; }
  .badge-cont    { background: #E6F7EF; color: #2E7D52; }
  .badge-request { background: #FFF0F0; color: #D63031; }

  /* =============================================
     업무강도 뱃지
  ============================================= */
  .intensity-badge {
    display: inline-block;
    padding: 2px 7px;
    border-radius: 4px;
    font-size: 11px;
    font-weight: 600;
  }
  .intensity-최상 { background: #FFE0E0; color: #C0392B; }
  .intensity-상   { background: #FFE8CC; color: #D35400; }
  .intensity-중   { background: #FFF5CC; color: #B7770D; }
  .intensity-하   { background: #E8F5E9; color: #2E7D32; }
  .intensity-최하 { background: #F0F0F0; color: #666; }

  /* =============================================
     진행상태 셀 (모델링/제작도/매뉴얼)
  ============================================= */
  .progress-cell {
    display: inline-block;
    padding: 2px 7px;
    border-radius: 4px;
    font-size: 11px;
  }
  .progress-완료    { background: #E3F4FB; color: #2E86AB; }
  .progress-진행중  { background: #F0EBFF; color: #7C5CBF; }
  .progress-미적용  { background: #F5F5F5; color: #999; }

  /* =============================================
     액션 버튼 (수정/삭제)
  ============================================= */
  .btn-action {
    padding: 4px 10px;
    border-radius: 5px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    border: 1px solid;
    transition: opacity 0.15s;
  }
  .btn-action:hover { opacity: 0.75; }
  .btn-edit   { background: #F0EBFF; color: #7C5CBF; border-color: #D4C5F5; }
  .btn-delete { background: #FFF0F0; color: #D63031; border-color: #FFCDD2; }

  /* =============================================
     빈 데이터 안내 메시지
  ============================================= */
  .empty-msg {
    text-align: center;
    padding: 48px 20px;
    color: #BBB;
    font-size: 14px;
  }

  /* =============================================
     모달 (팝업) - 추가/수정 폼
     배경 클릭해도 닫히지 않음 (X버튼만)
  ============================================= */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.45);
    z-index: 1000;
    align-items: center;
    justify-content: center;
  }
  .modal-overlay.open { display: flex; }

  .modal {
    background: #fff;
    border-radius: 14px;
    padding: 28px;
    width: 90%;
    max-width: 640px;
    max-height: 90vh;
    overflow-y: auto;
    position: relative;
    box-shadow: 0 8px 40px rgba(0,0,0,0.18);
  }

  .modal-title {
    font-size: 16px;
    font-weight: 700;
    color: #1A1A2E;
    margin-bottom: 20px;
  }

  /* X 닫기 버튼 */
  .modal-close {
    position: absolute;
    top: 16px;
    right: 18px;
    background: none;
    border: none;
    font-size: 20px;
    color: #999;
    cursor: pointer;
    line-height: 1;
  }
  .modal-close:hover { color: #333; }

  /* 폼 그리드 레이아웃 */
  .form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
  }
  .form-grid .full { grid-column: 1 / -1; }

  .form-group label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    color: #555;
    margin-bottom: 5px;
  }

  /* 폼 입력창 공통 */
  .form-group input,
  .form-group select,
  .form-group textarea {
    width: 100%;
    padding: 9px 12px;
    border: 1px solid #DDD;
    border-radius: 7px;
    font-size: 13px;
    color: #333;
    outline: none;
    font-family: inherit;
    transition: border-color 0.15s;
  }
  .form-group input:focus,
  .form-group select:focus,
  .form-group textarea:focus { border-color: #7C5CBF; }

  .form-group textarea { resize: vertical; min-height: 70px; }

  /* 모달 하단 버튼 영역 */
  .modal-footer {
    display: flex;
    gap: 10px;
    justify-content: flex-end;
    margin-top: 20px;
  }

  /* 저장/취소 버튼 */
  .btn-save {
    padding: 9px 22px;
    background: #7C5CBF;
    color: #fff;
    border: none;
    border-radius: 7px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s;
  }
  .btn-save:hover { background: #6A4DAD; }

  .btn-cancel {
    padding: 9px 22px;
    background: #F5F5F5;
    color: #555;
    border: 1px solid #DDD;
    border-radius: 7px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s;
  }
  .btn-cancel:hover { background: #EBEBEB; }

  /* =============================================
     경비사용내역 전용 스타일
  ============================================= */
  /* 예산 현황 바 */
  .budget-summary {
    background: #fff;
    border: 1px solid #EBEBF0;
    border-radius: 10px;
    padding: 18px 20px;
    margin-bottom: 16px;
  }

  .budget-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
    gap: 12px;
    flex-wrap: wrap;
  }

  .budget-info {
    display: flex;
    gap: 24px;
    flex-wrap: wrap;
  }

  .budget-item .label {
    font-size: 12px;
    color: #999;
    margin-bottom: 2px;
  }
  .budget-item .val {
    font-size: 16px;
    font-weight: 700;
    color: #1A1A2E;
  }
  .budget-item .val.spent { color: #D63031; }
  .budget-item .val.remain { color: #2E7D52; }

  /* 예산 사용 프로그레스 바 */
  .progress-bar-wrap {
    background: #F0F0F5;
    border-radius: 20px;
    height: 8px;
    overflow: hidden;
    margin-top: 6px;
  }
  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, #7C5CBF, #D6336C);
    border-radius: 20px;
    transition: width 0.5s ease;
  }

  /* =============================================
     로딩 스피너
  ============================================= */
  .loading {
    text-align: center;
    padding: 40px;
    color: #999;
    font-size: 14px;
  }

  /* =============================================
     토스트 알림 메시지
  ============================================= */
  .toast {
    position: fixed;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: #1A1A2E;
    color: #fff;
    padding: 11px 22px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 500;
    opacity: 0;
    transition: opacity 0.25s, transform 0.25s;
    z-index: 9999;
    white-space: nowrap;
  }
  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* =============================================
     초기 데이터 업로드 버튼
  ============================================= */
  .btn-import {
    padding: 8px 16px;
    background: #E6F7EF;
    color: #2E7D52;
    border: 1px solid #A8DFC0;
    border-radius: 7px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    white-space: nowrap;
    transition: background 0.15s;
  }
  .btn-import:hover { background: #C8EDD9; }

  /* =============================================
     모바일 반응형 (480px 이하)
  ============================================= */
  @media (max-width: 480px) {
    .header-title { font-size: 14px; }
    .main { padding: 12px; }
    .form-grid { grid-template-columns: 1fr; }
    .form-grid .full { grid-column: 1; }
    .summary-card { min-width: 80px; padding: 10px 12px; }
    .summary-card .value { font-size: 18px; }
    .header-actions { gap: 5px; }
    .tab-btn { padding: 10px 12px; font-size: 13px; }
  }
</style>
</head>
<body>

<!-- =============================================
     헤더: 타이틀 + 탭 + 새로고침
============================================= -->
<div class="header">
  <div class="header-top">
    <div class="header-title">🏢 기술전략팀 <span>업무관리</span></div>
    <div class="header-actions">
      <!-- 엑셀 데이터 초기 업로드 버튼 (처음 한 번만 사용) -->
      <button class="btn-import" onclick="importInitialData()">📥 초기데이터 업로드</button>
      <!-- 새로고침 버튼: 분홍 pill 스타일 -->
      <button class="btn-refresh" id="refreshBtn" onclick="refreshAll()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="23 4 23 10 17 10"></polyline>
          <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path>
        </svg>
        새로고침
      </button>
    </div>
  </div>
  <!-- 탭 전환 버튼 -->
  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('task')" id="tab-task">📋 업무일정표</button>
    <button class="tab-btn" onclick="switchTab('expense')" id="tab-expense">💰 경비사용내역</button>
  </div>
</div>

<!-- =============================================
     메인 콘텐츠
============================================= -->
<div class="main">

  <!-- ==================== 탭 1: 업무일정표 ==================== -->
  <div class="tab-panel active" id="panel-task">

    <!-- 상태별 요약 카드 -->
    <div class="summary-cards">
      <div class="summary-card done">
        <div class="label">✅ 완료</div>
        <div class="value" id="cnt-done">-</div>
      </div>
      <div class="summary-card ing">
        <div class="label">🔄 진행중</div>
        <div class="value" id="cnt-ing">-</div>
      </div>
      <div class="summary-card hold">
        <div class="label">⏸ 보류</div>
        <div class="value" id="cnt-hold">-</div>
      </div>
      <div class="summary-card cont">
        <div class="label">♻️ 지속진행</div>
        <div class="value" id="cnt-cont">-</div>
      </div>
      <div class="summary-card">
        <div class="label">📌 요청</div>
        <div class="value" id="cnt-req">-</div>
      </div>
      <div class="summary-card">
        <div class="label">📊 전체</div>
        <div class="value" id="cnt-all">-</div>
      </div>
    </div>

    <!-- 필터 툴바 -->
    <div class="toolbar">
      <input type="text" class="search-input" id="taskSearch" placeholder="🔍 업무내용, 담당자, 프로젝트명 검색..." oninput="renderTaskTable()">
      <select class="filter-select" id="filterStatus" onchange="renderTaskTable()">
        <option value="">전체 상태</option>
        <option value="완료">✅ 완료</option>
        <option value="진행중">🔄 진행중</option>
        <option value="보류">⏸ 보류</option>
        <option value="지속적진행">♻️ 지속진행</option>
        <option value="요청">📌 요청</option>
      </select>
      <select class="filter-select" id="filterLead" onchange="renderTaskTable()">
        <option value="">전체 담당자</option>
        <option value="주종현">주종현</option>
        <option value="정재철">정재철</option>
        <option value="김태훈">김태훈</option>
        <option value="이미녕">이미녕</option>
      </select>
      <select class="filter-select" id="filterCategory" onchange="renderTaskTable()">
        <option value="">전체 분류</option>
        <option value="국내영업">국내영업</option>
        <option value="국내">국내</option>
        <option value="해외">해외</option>
        <option value="어드벤처">어드벤처</option>
        <option value="신제품개발">신제품개발</option>
        <option value="DB">DB</option>
        <option value="기성품">기성품</option>
        <option value="개발">개발</option>
        <option value="HPL">HPL</option>
        <option value="3D프린터">3D프린터</option>
      </select>
      <button class="btn-add" onclick="openTaskModal()">+ 업무 추가</button>
    </div>

    <!-- 업무일정표 테이블 -->
    <div class="table-wrap">
      <div id="taskTableWrap">
        <div class="loading">⏳ 데이터를 불러오는 중...</div>
      </div>
    </div>
  </div>

  <!-- ==================== 탭 2: 부서경비사용내역 ==================== -->
  <div class="tab-panel" id="panel-expense">

    <!-- 예산 현황 요약 -->
    <div class="budget-summary" id="budgetSummary">
      <div class="budget-row">
        <div class="budget-info">
          <div class="budget-item">
            <div class="label">총 배정금액</div>
            <div class="val" id="budgetTotal">-</div>
          </div>
          <div class="budget-item">
            <div class="label">집행금액</div>
            <div class="val spent" id="budgetSpent">-</div>
          </div>
          <div class="budget-item">
            <div class="label">미집행(잔액)</div>
            <div class="val remain" id="budgetRemain">-</div>
          </div>
          <div class="budget-item">
            <div class="label">집행률</div>
            <div class="val" id="budgetRate">-</div>

<div class="toast" id="toast"></div>

<script>
/* =============================================
   Supabase 연결 설정
   URL과 anon 키를 여기서 관리합니다
============================================= */
const SUPABASE_URL = 'https://zrhwdvuehaelintkfoqn.supabase.co';
const SUPABASE_KEY = 'sb_publishable_oQ7F4Q9KRS22lpiE9uILFA_zN7n2V4V';

// Supabase REST API 헤더 (모든 요청에 공통으로 사용)
const HEADERS = {
  'Content-Type': 'application/json',
  'apikey': SUPABASE_KEY,
  'Authorization': `Bearer ${SUPABASE_KEY}`,
  'Prefer': 'return=representation'
};

/* =============================================
   앱 상태 변수
   전역으로 불러온 데이터를 저장해 둡니다
============================================= */
let taskData = [];     // 업무일정표 전체 데이터
let expenseData = [];  // 경비사용내역 전체 데이터
let editingTaskId = null;     // 현재 수정 중인 업무 ID
let editingExpenseId = null;  // 현재 수정 중인 경비 ID

/* =============================================
   앱 시작: 데이터 로드
============================================= */
async function init() {
  await Promise.all([loadTasks(), loadExpenses()]);
}

/* =============================================
   탭 전환
   tab: 'task' 또는 'expense'
============================================= */
function switchTab(tab) {
  // 모든 탭 버튼과 패널 비활성화
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  // 선택한 탭 활성화
  document.getElementById('tab-' + tab).classList.add('active');
  document.getElementById('panel-' + tab).classList.add('active');
}

/* =============================================
   새로고침 버튼 동작
   아이콘 회전 + 데이터 다시 불러오기
============================================= */
async function refreshAll() {
  const btn = document.getElementById('refreshBtn');
  btn.classList.add('spinning');
  await Promise.all([loadTasks(), loadExpenses()]);
  // 0.6초 후 회전 클래스 제거 (애니메이션 끝나고)
  setTimeout(() => btn.classList.remove('spinning'), 600);
}

/* =============================================
   토스트 알림 표시
   msg: 표시할 메시지
   duration: 표시 시간(ms), 기본 2000
============================================= */
function showToast(msg, duration = 2000) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), duration);
}

/* =============================================
   날짜 포맷 변환
   엑셀 serial 숫자 → YYYY-MM-DD 문자열
============================================= */
function excelSerialToDate(serial) {
  if (!serial || serial < 0) return null;
  // 엑셀 날짜는 1900-01-01 기준 serial number
  const utc_days = Math.floor(serial - 25569);
  const utc_value = utc_days * 86400;
  const date_info = new Date(utc_value * 1000);
  const y = date_info.getFullYear();
  const m = String(date_info.getMonth() + 1).padStart(2, '0');
  const d = String(date_info.getDate()).padStart(2, '0');
  return `${y}-${m}-${d}`;
}

/* =============================================
   날짜 표시용 포맷 (YYYY-MM-DD → MM/DD)
============================================= */
function fmtDate(dateStr) {
  if (!dateStr) return '-';
  const parts = dateStr.split('-');
  if (parts.length < 3) return dateStr;
  return `${parts[1]}/${parts[2]}`;
}

/* =============================================
   금액 포맷 (숫자 → 천단위 콤마)
============================================= */
function fmtMoney(n) {
  if (!n && n !== 0) return '-';
  return Number(n).toLocaleString('ko-KR') + '원';
}

/* =============================================
   상태 뱃지 HTML 생성
============================================= */
function statusBadge(status) {
  if (!status) return '';
  // status 값에서 핵심 키워드 추출
  const s = status.toLowerCase();
  if (s.includes('완료')) return `<span class="badge badge-done">완료</span>`;
  if (s.includes('진행중')) return `<span class="badge badge-ing">진행중</span>`;
  if (s.includes('보류')) return `<span class="badge badge-hold">보류</span>`;
  if (s.includes('지속')) return `<span class="badge badge-cont">지속진행</span>`;
  if (s.includes('요청')) return `<span class="badge badge-request">요청</span>`;
  return `<span class="badge">${status}</span>`;
}

/* =============================================
   진행상태 뱃지 (모델링/제작도/매뉴얼)
============================================= */
function progressBadge(val) {
  if (!val) return '<span style="color:#CCC">-</span>';
  return `<span class="progress-cell progress-${val}">${val}</span>`;
}

/* =============================================
   업무강도 뱃지
============================================= */
function intensityBadge(val) {
  if (!val) return '-';
  return `<span class="intensity-badge intensity-${val}">${val}</span>`;
}

/* =============================================
   업무일정표 데이터 로드
   Supabase에서 전체 데이터 가져오기
============================================= */
async function loadTasks() {
  try {
    const res = await fetch(
      `${SUPABASE_URL}/rest/v1/task_schedule?order=created_at.asc`,
      { headers: HEADERS }
    );
    taskData = await res.json();
    renderTaskTable();
    updateTaskSummary();
  } catch (e) {
    console.error('업무 데이터 로드 실패:', e);
    document.getElementById('taskTableWrap').innerHTML =
      '<div class="empty-msg">❌ 데이터 로드에 실패했습니다.</div>';
  }
}

/* =============================================
   업무일정표 요약 카드 업데이트
============================================= */
function updateTaskSummary() {
  const counts = { done: 0, ing: 0, hold: 0, cont: 0, req: 0 };
  taskData.forEach(t => {
    const s = (t.status || '').toLowerCase();
    if (s.includes('완료')) counts.done++;
    else if (s.includes('진행중')) counts.ing++;
    else if (s.includes('보류')) counts.hold++;
    else if (s.includes('지속')) counts.cont++;
    else if (s.includes('요청')) counts.req++;
  });
  document.getElementById('cnt-done').textContent = counts.done;
  document.getElementById('cnt-ing').textContent = counts.ing;
  document.getElementById('cnt-hold').textContent = counts.hold;
  document.getElementById('cnt-cont').textContent = counts.cont;
  document.getElementById('cnt-req').textContent = counts.req;
  document.getElementById('cnt-all').textContent = taskData.length;
}

/* =============================================
   업무일정표 테이블 렌더링
   필터/검색 조건 적용 후 HTML 생성
============================================= */
function renderTaskTable() {
  const search = (document.getElementById('taskSearch').value || '').toLowerCase();
  const statusFilter = document.getElementById('filterStatus').value;
  const leadFilter = document.getElementById('filterLead').value;
  const catFilter = document.getElementById('filterCategory').value;

  // 필터 조건 적용
  const filtered = taskData.filter(t => {
    // 검색어 필터 (업무내용, 담당자, 제목)
    const matchSearch = !search || (
      (t.title || '').toLowerCase().includes(search) ||
      (t.lead || '').toLowerCase().includes(search) ||
      (t.sub || '').toLowerCase().includes(search) ||
      (t.location || '').toLowerCase().includes(search)
    );
    // 상태 필터
    const matchStatus = !statusFilter ||
      (t.status || '').includes(statusFilter);
    // 담당자 필터
    const matchLead = !leadFilter || t.lead === leadFilter;
    // 분류 필터
    const matchCat = !catFilter || t.category === catFilter;

    return matchSearch && matchStatus && matchLead && matchCat;
  });

  if (filtered.length === 0) {
    document.getElementById('taskTableWrap').innerHTML =
      '<div class="empty-msg">📭 조건에 맞는 업무가 없습니다.</div>';
    return;
  }

  // 테이블 HTML 생성
  let html = `
  <table>
    <thead>
      <tr>
        <th>상태</th>
        <th>주담당자</th>
        <th>보조</th>
        <th style="min-width:240px">프로젝트명 / 업무내용</th>
        <th>출고지</th>
        <th>시작</th>
        <th>마감</th>
        <th>D-day</th>
        <th>영업담당</th>
        <th>분류</th>
        <th>모델링</th>
        <th>제작도</th>
        <th>매뉴얼</th>
        <th>강도</th>
        <th style="min-width:80px">관리</th>
      </tr>
    </thead>
    <tbody>
  `;

  filtered.forEach(t => {
    // D-day 색상 처리
    let ddayTxt = '-';
    let ddayStyle = '';
    if (t.dday !== null && t.dday !== undefined && t.dday !== -33015) {
      ddayTxt = t.dday >= 0 ? `D+${t.dday}` : `D${t.dday}`;
      ddayStyle = t.dday > 7 ? 'color:#D63031;font-weight:700' :
                  t.dday > 0 ? 'color:#D48806;font-weight:700' : '';
    }

    html += `
    <tr>
      <td>${statusBadge(t.status)}</td>
      <td><strong>${t.lead || '-'}</strong></td>
      <td style="color:#888">${t.sub || '-'}</td>
      <td title="${t.title || ''}">${t.title || '-'}</td>
      <td>${t.location || '-'}</td>
      <td>${fmtDate(t.start_date)}</td>
      <td>${fmtDate(t.deadline)}</td>
      <td style="${ddayStyle}">${ddayTxt}</td>
      <td>${t.sales || '-'}</td>
      <td>${t.category || '-'}</td>
      <td>${progressBadge(t.modeling)}</td>
      <td>${progressBadge(t.drawing)}</td>
      <td>${progressBadge(t.manual)}</td>
      <td>${intensityBadge(t.intensity)}</td>
      <td>
        <button class="btn-action btn-edit" onclick="editTask('${t.id}')">수정</button>
        <button class="btn-action btn-delete" onclick="deleteTask('${t.id}')">삭제</button>
      </td>
    </tr>`;
  });

  html += `</tbody></table>`;
  document.getElementById('taskTableWrap').innerHTML = html;
}

/* =============================================
   업무 추가 모달 열기
============================================= */
function openTaskModal() {
  editingTaskId = null;
  document.getElementById('taskModalTitle').textContent = '업무 추가';
  // 폼 초기화
  clearTaskForm();
  document.getElementById('taskModal').classList.add('open');
}

/* =============================================
   업무 수정 모달 열기
   id: 수정할 업무의 UUID
============================================= */
function editTask(id) {
  const t = taskData.find(x => x.id === id);
  if (!t) return;
  editingTaskId = id;
  document.getElementById('taskModalTitle').textContent = '업무 수정';

  // 폼에 기존 데이터 채우기
  document.getElementById('f-status').value     = t.status || '';
  document.getElementById('f-intensity').value  = t.intensity || '중';
  document.getElementById('f-lead').value        = t.lead || '';
  document.getElementById('f-sub').value         = t.sub || '';
  document.getElementById('f-title').value       = t.title || '';
  document.getElementById('f-location').value    = t.location || '';
  document.getElementById('f-sales').value       = t.sales || '';
  document.getElementById('f-start').value       = t.start_date || '';
  document.getElementById('f-end').value         = t.end_date || '';
  document.getElementById('f-request').value     = t.request_date || '';
  document.getElementById('f-deadline').value    = t.deadline || '';

async function loadExpenses() {
  try {

      `${SUPABASE_URL}/rest/v1/dept_expense?order=seq.asc`,
      { headers: HEADERS }
    );

    renderExpenseTable();
    updateBudgetSummary();
  } catch (e) {
    console.error('경비 데이터 로드 실패:', e);
    document.getElementById('expenseTableWrap').innerHTML =
      '<div class="empty-msg">❌ 데이터 로드에 실패했습니다.</div>';

/* =============================================
   예산 현황 업데이트
   총 배정, 집행, 잔액, 집행률 계산
============================================= */
function updateBudgetSummary() {
  const TOTAL_BUDGET = 1080000; // 연간 총 배정금액 (고정)
  const spent = expenseData.reduce((sum, e) => sum + (Number(e.amount) || 0), 0);
  const remain = TOTAL_BUDGET - spent;
  const rate = Math.min(100, Math.round((spent / TOTAL_BUDGET) * 100));

  document.getElementById('budgetTotal').textContent  = fmtMoney(TOTAL_BUDGET);
  document.getElementById('budgetSpent').textContent  = fmtMoney(spent);
  document.getElementById('budgetRemain').textContent = fmtMoney(remain);
  document.getElementById('budgetRate').textContent   = `${rate}%`;
  document.getElementById('budgetBar').style.width    = `${rate}%`;
}

/* =============================================
   경비사용내역 테이블 렌더링
============================================= */
function renderExpenseTable() {
  const search = (document.getElementById('expenseSearch').value || '').toLowerCase();

  const filtered = expenseData.filter(e =>
    !search || (
      (e.expense_type || '').toLowerCase().includes(search) ||
      (e.note || '').toLowerCase().includes(search)
    )
  );

  if (filtered.length === 0) {
    document.getElementById('expenseTableWrap').innerHTML =
      '<div class="empty-msg">📭 경비 내역이 없습니다.</div>';
    return;
  }

  let html = `
  <table>
    <thead>
      <tr>
        <th>번호</th>
        <th>사용일자</th>
        <th>경비항목</th>
        <th>참석인원</th>
        <th>경비한도</th>
        <th>금차 집행액</th>
        <th>사용 후 잔액</th>
        <th>비고 (사용목적)</th>
        <th>관리</th>
      </tr>
    </thead>
    <tbody>
  `;

  filtered.forEach((e, idx) => {
    html += `
    <tr>
      <td style="color:#999">${e.seq || idx + 1}</td>
      <td>${e.used_date ? e.used_date.replace(/-/g, '.') : '-'}</td>
      <td>
        <span class="badge ${e.expense_type === '식사' ? 'badge-ing' :
                             e.expense_type === '커피' ? 'badge-cont' : ''}">
          ${e.expense_type || '-'}
        </span>
      </td>
      <td>${e.attendees ? e.attendees + '명' : '-'}</td>
      <td style="color:#888">${fmtMoney(e.budget_limit)}</td>
      <td style="color:#D63031;font-weight:600">${fmtMoney(e.amount)}</td>
      <td style="color:#2E7D52;font-weight:600">${fmtMoney(e.balance)}</td>
      <td>${e.note || '-'}</td>
      <td>
        <button class="btn-action btn-edit" onclick="editExpense('${e.id}')">수정</button>
        <button class="btn-action btn-delete" onclick="deleteExpense('${e.id}')">삭제</button>
      </td>
    </tr>`;
  });

  html += `</tbody></table>`;
  document.getElementById('expenseTableWrap').innerHTML = html;
}

/* =============================================
   경비 저장 (추가 또는 수정)
   잔액은 자동 계산: 이전 잔액 - 집행액
============================================= */
async function saveExpense() {
  const amount = Number(document.getElementById('ef-amount').value);
  if (!amount) { showToast('⚠️ 집행액을 입력해주세요.'); return; }

  const TOTAL_BUDGET = 1080000;

  // 잔액 자동 계산: 총배정 - 기존집행합 - 이번집행액
  const prevSpent = expenseData
    .filter(e => e.id !== editingExpenseId)
    .reduce((sum, e) => sum + (Number(e.amount) || 0), 0);
  const newBalance = TOTAL_BUDGET - prevSpent - amount;

  // 순번 계산
  const maxSeq = expenseData.length > 0
    ? Math.max(...expenseData.map(e => e.seq || 0))
    : 0;

  const payload = {
    seq:          editingExpenseId ? undefined : maxSeq + 1,
    used_date:    document.getElementById('ef-date').value || null,
    expense_type: document.getElementById('ef-type').value,
    attendees:    Number(document.getElementById('ef-attendees').value) || null,
    budget_limit: TOTAL_BUDGET - prevSpent, // 집행 전 잔액
    amount:       amount,
    balance:      newBalance,
    note:         document.getElementById('ef-note').value,
  };
  if (editingExpenseId) delete payload.seq;

  try {
    let res;
    if (editingExpenseId) {
      res = await fetch(
        `${SUPABASE_URL}/rest/v1/dept_expense?id=eq.${editingExpenseId}`,
        { method: 'PATCH', headers: HEADERS, body: JSON.stringify(payload) }
      );
    } else {
      res = await fetch(
        `${SUPABASE_URL}/rest/v1/dept_expense`,
        { method: 'POST', headers: HEADERS, body: JSON.stringify(payload) }
      );
    }
    if (!res.ok) throw new Error(await res.text());
    closeExpenseModal();
    await loadExpenses();
    showToast(editingExpenseId ? '✅ 경비가 수정되었습니다.' : '✅ 경비가 추가되었습니다.');
  } catch (e) {
    console.error('저장 실패:', e);
    showToast('❌ 저장에 실패했습니다.');
  }
}
